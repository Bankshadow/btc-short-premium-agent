# Railway — set region to Singapore/Asia in dashboard after first deploy.
# Usage (from this directory):
#   railway login
#   railway init
#   railway variables set BINANCE_PROXY_SECRET=<same-as-vercel>
#   railway up

[build]
builder = "DOCKERFILE"
dockerfilePath = "Dockerfile"

[deploy]
healthcheckPath = "/health"
healthcheckTimeout = 30
restartPolicyType = "ON_FAILURE"
restartPolicyMaxRetries = 3
