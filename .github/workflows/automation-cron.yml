# Calls /api/cron/tick every 5 minutes (GitHub minimum). The tick endpoint
# respects the interval configured in /settings/cron (can be 1–120 min).
#
# Required GitHub repo secret: CRON_SECRET

name: Production automation cron

on:
  schedule:
    - cron: "*/5 * * * *"
  workflow_dispatch:

concurrency:
  group: production-automation-cron
  cancel-in-progress: false

jobs:
  cron-tick:
    runs-on: ubuntu-latest
    timeout-minutes: 5
    steps:
      - name: Trigger /api/cron/tick
        env:
          CRON_SECRET: ${{ secrets.CRON_SECRET }}
          APP_URL: https://btc-short-premium-agent.vercel.app
        run: |
          if [ -z "$CRON_SECRET" ]; then
            echo "CRON_SECRET GitHub secret is not set — skipping."
            exit 1
          fi
          response="$(curl -sS -w '\n%{http_code}' \
            -H "Authorization: Bearer ${CRON_SECRET}" \
            "${APP_URL}/api/cron/tick")"
          body="$(echo "$response" | head -n -1)"
          code="$(echo "$response" | tail -n 1)"
          echo "$body"
          if [ "$code" -lt 200 ] || [ "$code" -ge 300 ]; then
            echo "HTTP $code"
            exit 1
          fi
