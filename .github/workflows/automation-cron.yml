# Calls /api/cron/tick every 5 minutes (GitHub minimum). The tick endpoint
# respects the interval configured in /settings/cron (can be 1–120 min).
#
# Required: Repository secret CRON_SECRET (Settings -> Secrets -> Actions -> Repository secrets).
# Environment secrets are NOT used unless this job declares `environment:`.

name: Production automation cron

on:
  schedule:
    - cron: "*/5 * * * *"
  workflow_dispatch:
  push:
    branches: [main]
    paths:
      - ".github/workflows/automation-cron.yml"

concurrency:
  group: production-automation-cron
  cancel-in-progress: false

jobs:
  cron-tick:
    runs-on: ubuntu-latest
    # Picks up secrets from the "CRON_SECRET" GitHub Environment (if used).
    # Repository secret CRON_SECRET also works when set under Actions -> Repository secrets.
    environment: CRON_SECRET
    timeout-minutes: 5
    steps:
      - name: Trigger /api/cron/tick
        env:
          CRON_SECRET: ${{ secrets.CRON_SECRET }}
          APP_URL: https://btc-short-premium-agent.vercel.app
        run: |
          if [ -z "$CRON_SECRET" ]; then
            echo "CRON_SECRET repository secret is missing."
            echo "Add it under Settings -> Secrets and variables -> Actions -> Repository secrets (not Environment secrets)."
            exit 1
          fi
          echo "CRON_SECRET length: ${#CRON_SECRET}"
          response="$(curl -sS -w '\n%{http_code}' \
            -H "Authorization: Bearer ${CRON_SECRET}" \
            "${APP_URL}/api/cron/tick")"
          body="$(echo "$response" | head -n -1)"
          code="$(echo "$response" | tail -n 1)"
          echo "$body"
          if [ "$code" -lt 200 ] || [ "$code" -ge 300 ]; then
            echo "HTTP $code"
            if [ "$code" = "401" ]; then
              echo "Hint: CRON_SECRET must match the Vercel CRON_SECRET exactly."
            fi
            exit 1
          fi
